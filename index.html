          { id:'pos',       title:'🛒 POS Bán hàng', body:'Bán hàng trực tiếp ở tab POS. Chọn món → thêm vào giỏ → thanh toán. Đơn ghi nhận và tự trừ kho theo công thức.' },
          { id:'import',    title:'📥 Import CSV', body:'Đã có POS khác? Cuối ngày xuất CSV từ KiotViet/Sapo/iPos/MISA và import vào đây — app tự trừ kho cho bạn.' },
          { id:'inventory', title:'📦 Kho', body:'Nhập/xuất nguyên liệu, theo dõi tồn. App cảnh báo khi sắp hết.' },
          { id:'settings',  title:'⚙ Cài đặt', body:'Đổi tên quán, logo, người dùng PIN, đồng bộ Google Sheets, Telegram, kiosk mode, sao lưu. Tất cả ở đây.' },
        ],

        // ---- New user form ----
        newUser: { name: '', pin: '', role: 'staff' },

        // ---- GAS / TG ----
        gasUrl: '', gasKey: '', gasMsg: '',
        tgToken: '', tgChat: '', tgMsg: '',

        // ---- Kiosk ----
        kioskTable: '',

        // ---- Computed-like ----
        navItems() {
          const all = [
            { id: 'dashboard', label: 'Tổng quan', icon: 'dashboard' },
            { id: 'pos',       label: 'POS Bán hàng', icon: 'pos' },
            { id: 'import',    label: 'Import CSV',  icon: 'import', ownerOnly: true },
            { id: 'orders',    label: 'Đơn hàng',    icon: 'orders' },
            { id: 'reports',   label: 'Báo cáo',     icon: 'reports' },
            { id: 'menu',      label: 'Menu',        icon: 'menu', ownerOnly: true },
            { id: 'inventory', label: 'Kho',         icon: 'inventory', ownerOnly: true },
            { id: 'settings',  label: 'Cài đặt',     icon: 'settings', ownerOnly: true },
          ];
          return all.filter(i => !i.ownerOnly || this.user?.role === 'owner');
        },
        bottomNavItems() {
          return [
            { id: 'dashboard', label: 'Tổng quan', icon: 'dashboard' },
            { id: 'pos',       label: 'POS',       icon: 'pos' },
            { id: 'orders',    label: 'Đơn',       icon: 'orders' },
            { id: 'reports',   label: 'Báo cáo',   icon: 'reports' },
            { id: this.user?.role === 'owner' ? 'settings' : 'reports', label: this.user?.role === 'owner' ? 'Cài đặt' : 'Đơn', icon: this.user?.role === 'owner' ? 'settings' : 'orders' },
          ];
        },
        viewLabel() {
          const labels = { dashboard: 'Tổng quan', pos: 'POS Bán hàng', import: 'Import CSV', orders: 'Đơn hàng', reports: 'Báo cáo', menu: 'Menu', inventory: 'Kho', settings: 'Cài đặt' };
          return labels[this.view] || this.view;
        },
        shiftLabel() {
          const h = new Date().getHours();
          if (h < 11) return 'Ca sáng';
          if (h < 17) return 'Ca chiều';
          return 'Ca tối';
        },
        initials(name) {
          if (!name) return '?';
          return name.split(' ').slice(-2).map(w => w[0]?.toUpperCase()).join('') || '?';
        },
        kioskUrl(table) {
          const base = location.origin + location.pathname.replace(/index\.html?$/, '') + 'kiosk.html';
          return base + (table ? '?table=' + table : '');
        },

        // ---- BOOT ----
        async boot() {
          window.addEventListener('online',  () => this.online = true);
          window.addEventListener('offline', () => this.online = false);
          this.detectLayout();
          window.addEventListener('resize', () => this.detectLayout());
          document.documentElement.setAttribute('data-theme', this.theme);
          document.documentElement.classList.toggle('big-text', this.bigText);

          try {
            this.bootMsg = 'Đang tải dữ liệu offline...';
            await DB.init();
            this.bootMsg = 'Đang nạp menu...';
            this.shop = Models.getShop();
            this.vatPct = this.shop?.tax_rate || 0;
            this.loadCatalog();
            this.users = Models.listUsers(this.shop.id);
            const cfg = GASClient.getConfig();
            this.gasUrl = cfg.url || ''; this.gasKey = cfg.api_key || '';
            const tg = TelegramBot.getConfig();
            this.tgToken = tg.bot_token || ''; this.tgChat = tg.chat_id || '';
            SyncQueue.start(this.shop.id, 60000);
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.register('service-worker.js').catch(e => console.warn('SW reg', e));
            }
            // Global keyboard shortcuts
            document.addEventListener('keydown', (e) => this.handleKey(e));
            this.booted = true;
          } catch (e) {
            this.bootMsg = 'Lỗi khởi tạo: ' + e.message;
            console.error(e);
          }
        },

        detectLayout() {
          const w = window.innerWidth;
          this.layout = w < 768 ? 'mobile' : (w < 1024 ? 'tablet' : 'desktop');
        },
        toggleNav() {
          if (this.layout === 'mobile') this.mobileNavOpen = !this.mobileNavOpen;
          else if (this.layout === 'tablet') this.sidebarOpenTablet = !this.sidebarOpenTablet;
        },

        loadCatalog() {
          this.categories = Models.listCategories(this.shop.id);
          this.products = Models.listProducts(this.shop.id);
          this.ingredients = Models.listIngredients(this.shop.id);
          this.lowStock = Models.lowStockAlerts(this.shop.id);
        },

        // ---- LOGIN ----
        pressPin(d) { if (this.pin.length < 4) this.pin += d; this.loginError = ''; },
        async submitPin() {
          if (this.pin.length !== 4) return;
          const u = await Models.authPin(this.pin, this.shop.id);
          if (!u) { this.loginError = 'PIN không đúng'; this.pin = ''; return; }
          Session.set(u);
          this.user = u;
          this.pin = ''; this.loginError = '';
          this.refreshReports();
          this.loadOrders();
          this.refreshDashboard();
          this.loadFavorites();
          this.startAutoLogout();
          // First-run tour?
          if (!localStorage.getItem('eco_tour_done')) {
            setTimeout(() => this.tourStep = 1, 600);
          }
        },
        logout() { Session.clear(); this.user = null; },

        autoLogoutTimer: null,
        startAutoLogout() {
          const mins = (window.BUSINESS_RULES?.auto_logout_minutes) || 15;
          const reset = () => {
            clearTimeout(this.autoLogoutTimer);
            this.autoLogoutTimer = setTimeout(() => this.logout(), mins * 60 * 1000);
          };
          ['click', 'keydown', 'touchstart'].forEach(ev => document.addEventListener(ev, reset, { passive: true }));
          reset();
        },

        // ---- Helpers ----
        formatVND(n) { return Utils.formatVND(n); },
        fmtTime(ts) { return Utils.fmtDateTime(ts); },
        categoryName(id) { const c = this.categories.find(x => x.id === id); return c ? c.name : '-'; },
        userName(id) { const u = this.users.find(x => x.id === id); return u ? u.name : null; },
        filteredProducts() {
          if (this.catFilter === 0) return this.products;
          return this.products.filter(p => p.category_id === this.catFilter);
        },

        // ---- Toasts + Undo ----
        showToast(msg, undoFn) {
          const id = this._toastId++;
          this.toasts.push({ id, msg, undo: undoFn || null });
          if (this.toasts.length > 3) this.toasts.shift();
          const ttl = undoFn ? 8000 : 2800;
          setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, ttl);
        },
        runUndo(toastId) {
          const t = this.toasts.find(x => x.id === toastId);
          if (t && typeof t.undo === 'function') {
            try { t.undo(); this.toasts = this.toasts.filter(x => x.id !== toastId); }
            catch (e) { console.error(e); this.showToast('Lỗi hoàn lại: ' + e.message); }
          }
        },

        // ---- POS ----
        onProductClick(p) {
          const groups = Models.getVariantGroupsForProduct(p.id).map(g => ({
            ...g, variants: Models.getVariantsForGroup(g.id)
          }));
          if (groups.length === 0) {
            this.cart.addProduct(p, []);
            this.showToast('Đã thêm ' + p.name, () => { this.cart.remove(this.cart.items.length - 1); });
            return;
          }
          this.variantPicker = { open: true, product: p, groups, selection: {} };
        },
        quickAdd(p) {
          // Add with empty variants (default product) — fast path
          this.cart.addProduct(p, []);
          this.showToast('+1 ' + p.name, () => { this.cart.remove(this.cart.items.length - 1); });
        },
        toggleVariant(g, v) {
          const sel = this.variantPicker.selection;
          if (!sel[g.id]) sel[g.id] = [];
          if (g.selection_type === 'single') sel[g.id] = [v];
          else {
            const i = sel[g.id].findIndex(x => x.id === v.id);
            if (i >= 0) sel[g.id].splice(i, 1); else sel[g.id].push(v);
          }
        },
        isVariantSelected(g, v) {
          const arr = this.variantPicker.selection[g.id] || [];
          return arr.some(x => x.id === v.id);
        },
        variantPickerValid() {
          return this.variantPicker.groups.every(g => !g.required || (this.variantPicker.selection[g.id] || []).length > 0);
        },
        variantPickerTotal() {
          const base = this.variantPicker.product?.base_price || 0;
          const sum = Object.values(this.variantPicker.selection).flat().reduce((s, v) => s + (v.price_modifier || 0), 0);
          return base + sum;
        },
        confirmVariantPick() {
          const flat = Object.values(this.variantPicker.selection).flat();
          this.cart.addProduct(this.variantPicker.product, flat);
          const productName = this.variantPicker.product.name;
          this.variantPicker.open = false;
          this.showToast('Đã thêm ' + productName, () => { this.cart.remove(this.cart.items.length - 1); });
        },
        removeFromCart(idx) {
          const removed = this.cart.items[idx];
          this.cart.remove(idx);
          this.showToast('Đã xoá ' + removed.product_name, () => {
            this.cart.items.splice(idx, 0, removed);
          });
        },
        clearCart() {
          if (this.cart.items.length === 0) return;
          if (!confirm('Xoá hết giỏ hàng?')) return;
          const snapshot = JSON.parse(JSON.stringify(this.cart.items));
          this.cart.clear();
          this.showToast('Đã xoá giỏ hàng', () => {
            snapshot.forEach(it => this.cart.items.push(it));
          });
        },
        enabledPayments() {
          const out = {};
          Object.entries(window.PAYMENT_METHODS).forEach(([k, v]) => { if (k !== 'vietqr' && v.enabled) out[k] = v; });
          return out;
        },
        openCheckout() {
          if (this.cart.items.length === 0) return;
          const total = this.cart.total(this.vatPct);
          this.checkout = { open: true, method: 'cash', cash: total, note: '' };
        },
        suggestCash() {
          const t = this.cart.total(this.vatPct);
          const step = window.BUSINESS_RULES?.cash_round || 1000;
          const round = (n) => Math.ceil(n / step) * step;
          return [round(t), round(t) + 10000, round(t) + 20000, round(t) + 50000];
        },
        confirmCheckout() {
          const total = this.cart.total(this.vatPct);
          if (this.checkout.method === 'cash' && (this.checkout.cash || 0) < total) {
            this.showToast('Khách đưa thiếu tiền'); return;
          }
          try {
            const items = this.cart.items.map(i => ({ ...i }));
            const orderData = {
              branch_id: this.shop.id, user_id: this.user.id, status: 'paid',
              subtotal: this.cart.subtotal(), tax: this.cart.tax(this.vatPct),
              discount: this.cart.discount || 0, total,
              payment_method: this.checkout.method,
              cash_received: this.checkout.method === 'cash' ? this.checkout.cash : null,
              change_given: this.checkout.method === 'cash' ? Math.max(0, (this.checkout.cash || 0) - total) : null,
              note: this.checkout.note || '',
            };
            const res = Models.createOrder(orderData, items);
            // Show deduct summary in toast if any
            const agg = Models.aggregateDeductions(res.deductions || []);
            if (agg.length > 0) {
              const summary = agg.map(a => `${a.qty}${a.unit} ${a.ingredient_name.toLowerCase()}`).join(' · ');
              this.showToast(`✓ Đơn ${res.order_no} · Trừ kho: ${summary}`);
            } else {
              this.showToast('Đã lưu đơn ' + res.order_no);
            }
            this.cart.clear();
            this.checkout.open = false;
            this.refreshReports(); this.loadOrders(); this.refreshDashboard(); this.loadFavorites();
            SyncQueue.flushOnce(this.shop.id).catch(() => {});
          } catch (e) {
            this.showToast('Lỗi: ' + e.message); console.error(e);
          }
        },

        // ---- Dashboard ----
        refreshDashboard() {
          if (!this.shop) return;
          this.dash = Dashboard.snapshot(this.shop.id);
          this.lineChartHtml = Dashboard.renderLineChart(this.dash.trend30);
          this.topChartHtml = Dashboard.renderTopItemsBar(this.dash.topItems);
        },
        loadFavorites() {
          if (!this.shop) return;
          const start = Utils.startOfDay(new Date());
          const end = Utils.endOfDay(new Date());
          const top = Models.bestSellers(this.shop.id, start, end, 5);
          // Resolve to full product objects
          this.favorites = top.map(t => this.products.find(p => p.name === t.product_name)).filter(Boolean);
        },

        // ---- Reports ----
        refreshReports() {
          this.todayStats = Models.dailyRevenue(this.shop.id, new Date());
          const start = Utils.startOfDay(new Date());
          const end = Utils.endOfDay(new Date());
          this.todayBest = Models.bestSellers(this.shop.id, start, end, 5);
        },
        exportTodayCSV() {
          const orders = Models.listRecentOrders(this.shop.id, 1000)
            .filter(o => o.created_at >= Utils.startOfDay(new Date()) && o.created_at <= Utils.endOfDay(new Date()));
          const lines = ['ma_don,gio,nhan_vien,tong,phuong_thuc,trang_thai'];
          orders.forEach(o => {
            lines.push([o.order_no, Utils.fmtDateTime(o.created_at), this.userName(o.user_id) || '', o.total, o.payment_method, o.status].join(','));
          });
          const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = `doanh_thu_${Utils.today()}.csv`; a.click();
          URL.revokeObjectURL(url);
        },
        async sendTelegramDigest() {
          try { await TelegramBot.sendDailyDigest(this.shop.id); this.showToast('Đã gửi Telegram'); }
          catch (e) { this.showToast('Telegram lỗi: ' + e.message); }
        },

        // ---- Orders ----
        loadOrders() { this.orders = Models.listRecentOrders(this.shop.id, 20); },

        // ---- Nav ----
        goView(v) {
          this.view = v;
          if (this.layout === 'mobile') this.mobileNavOpen = false;
          if (v === 'dashboard') this.refreshDashboard();
          if (v === 'reports') this.refreshReports();
          if (v === 'orders') this.loadOrders();
          if (v === 'inventory') this.loadCatalog();
          if (v === 'pos') this.loadFavorites();
          if (v === 'import') this.impInit();
        },

        // ---- Product Editor (full modal with recipe tab) ----
        productEditor: { open: false, tab: 'info', p: null, recipes: [], newRecipeIngId: '', newRecipeQty: '', newRecipeVariant: '' },
        openProductEdit(p) {
          this.productEditor = {
            open: true, tab: 'info',
            p: p ? { ...p } : { id: null, branch_id: this.shop.id, category_id: this.categories[0]?.id || 1,
                                name: '', base_price: 25000, icon: '🥤', active: 1, sort_order: 0 },
            recipes: p ? Models.listRecipesForProduct(p.id) : [],
            newRecipeIngId: '', newRecipeQty: '', newRecipeVariant: '',
          };
        },
        saveProductEditor() {
          const p = this.productEditor.p;
          if (!p.name || !p.base_price) { alert('Cần tên + giá'); return; }
          const id = Models.upsertProduct({
            id: p.id, branch_id: this.shop.id, category_id: p.category_id,
            name: p.name, base_price: parseInt(p.base_price, 10),
            icon: p.icon, active: p.active ? 1 : 0, sort_order: p.sort_order || 0,
          });
          // Update productEditor.p.id for new product so recipes can be added
          this.productEditor.p.id = id;
          this.loadCatalog();
          this.showToast('Đã lưu sản phẩm');
        },
        addRecipeRow() {
          const p = this.productEditor.p;
          if (!p.id) { alert('Lưu sản phẩm trước khi thêm công thức'); return; }
          const ingId = parseInt(this.productEditor.newRecipeIngId, 10);
          const qty = parseFloat(this.productEditor.newRecipeQty);
          if (!ingId || !qty || qty <= 0) { alert('Chọn NVL và nhập số lượng > 0'); return; }
          const vf = this.productEditor.newRecipeVariant || null;
          Models.upsertRecipe(p.id, ingId, qty, vf);
          this.productEditor.recipes = Models.listRecipesForProduct(p.id);
          this.productEditor.newRecipeIngId = '';
          this.productEditor.newRecipeQty = '';
          this.productEditor.newRecipeVariant = '';
          this.showToast('Đã thêm NVL vào công thức');
        },
        removeRecipeRow(r) {
          if (!confirm('Xoá ' + r.ingredient_name + ' khỏi công thức?')) return;
          Models.removeRecipe(r.product_id, r.ingredient_id, r.variant_filter);
          this.productEditor.recipes = Models.listRecipesForProduct(r.product_id);
          this.showToast('Đã xoá');
        },
        recipeTotalCost() {
          return (this.productEditor.recipes || []).reduce((s, r) => s + Math.round((r.qty_per_unit || 0) * (r.cost_per_unit || 0)), 0);
        },
        recipeMarginPct() {
          const cost = this.recipeTotalCost();
          const price = parseInt(this.productEditor.p?.base_price, 10) || 0;
          if (!price) return 0;
          return Math.round(((price - cost) / price) * 100);
        },

        // ---- Inventory Editor (multi-row bulk) ----
        invEditor: {
          open: false, type: 'purchase', supplier: '', note: '',
          rows: [{ ingredient_id: '', qty: '', unit_cost: '' }],
          suppliers: [],
        },
        openInventoryTx(ing) {
          this.invEditor = {
            open: true, type: 'purchase', supplier: ing?.supplier || '', note: '',
            rows: ing
              ? [{ ingredient_id: ing.id, qty: '', unit_cost: ing.cost_per_unit }]
              : [{ ingredient_id: '', qty: '', unit_cost: '' }],
            suppliers: Models.listSuppliers(this.shop.id),
          };
        },
        invAddRow() {
          this.invEditor.rows.push({ ingredient_id: '', qty: '', unit_cost: '' });
        },
        invRemoveRow(i) {
          this.invEditor.rows.splice(i, 1);
          if (this.invEditor.rows.length === 0) this.invAddRow();
        },
        invRowChange(idx) {
          const row = this.invEditor.rows[idx];
          if (row.ingredient_id && !row.unit_cost) {
            const ing = this.ingredients.find(i => i.id === parseInt(row.ingredient_id, 10));
            if (ing) row.unit_cost = ing.cost_per_unit;
          }
        },
        invTotalCost() {
          return this.invEditor.rows.reduce((s, r) => {
            const q = parseFloat(r.qty) || 0;
            const c = parseInt(r.unit_cost, 10) || 0;
            return s + Math.round(Math.abs(q) * c);
          }, 0);
        },
        saveInventoryTx() {
          const type = this.invEditor.type;
          // Sign convention: nhập = +, xuất = -, hao hụt = -, điều chỉnh = signed by user
          const signFor = (t, q) => {
            if (t === 'purchase' || t === 'adjustment') return q;
            return -Math.abs(q);
          };
          const txs = [];
          this.invEditor.rows.forEach((r) => {
            const ingId = parseInt(r.ingredient_id, 10);
            const qty = parseFloat(r.qty);
            if (!ingId || isNaN(qty) || qty === 0) return;
            const cost = parseInt(r.unit_cost, 10) || 0;
            txs.push({
              branch_id: this.shop.id, ingredient_id: ingId, type,
              qty: signFor(type, qty),
              unit_cost: cost,
              total_cost: Math.round(Math.abs(qty) * cost),
              supplier: this.invEditor.supplier || null,
              note: this.invEditor.note || '',
              user_id: this.user.id,
            });
          });
          if (txs.length === 0) { alert('Chưa có dòng hợp lệ'); return; }
          Models.addInventoryTxBatch(txs);
          this.loadCatalog();
          this.invEditor.open = false;
          this.showToast('Đã ghi nhận ' + txs.length + ' dòng kho');
        },

        // ---- Deduct summary modal (after import) ----
        deductSummary: { open: false, title: '', orders: 0, items: 0, lines: [], lowAfter: [] },
        showDeductSummary(payload) {
          this.deductSummary = { ...payload, open: true };
        },

        // ---- Settings: shop, users ----
        saveShop() {
          Models.updateShop({
            id: this.shop.id, name: this.shop.name, address: this.shop.address,
            phone: this.shop.phone, slogan: this.shop.slogan,
            logo_data_url: this.shop.logo_data_url, tax_rate: this.shop.tax_rate || 0,
            round_to: this.shop.round_to || 1000, license_to: this.shop.license_to || '',
          });
          this.vatPct = this.shop.tax_rate || 0;
          this.showToast('Đã lưu thông tin quán');
        },
        uploadLogo(ev) {
          const f = ev.target.files[0]; if (!f) return;
          if (f.size > 200 * 1024) { alert('Logo > 200KB. Nén ảnh trước.'); return; }
          const r = new FileReader();
          r.onload = () => { this.shop.logo_data_url = r.result; this.showToast('Đã nạp logo (nhấn Lưu)'); };
          r.readAsDataURL(f);
        },
        async addUser() {
          if (!this.newUser.name || !this.newUser.pin || this.newUser.pin.length !== 4) {
            alert('Cần tên + PIN 4 số'); return;
          }
          await Models.createUser({
            branch_id: this.shop.id, name: this.newUser.name,
            pin: this.newUser.pin, role: this.newUser.role,
          });
          this.users = Models.listUsers(this.shop.id);
          this.newUser = { name: '', pin: '', role: 'staff' };
          this.showToast('Đã thêm người dùng');
        },
        async changePinFor(u) {
          const p = prompt('PIN mới (4 số) cho ' + u.name);
          if (!p || p.length !== 4) return;
          await Models.changePin(u.id, p, this.shop.id);
          this.showToast('Đã đổi PIN');
        },
        deactivate(u) {
          if (!confirm('Xoá ' + u.name + '?')) return;
          Models.deactivateUser(u.id);
          this.users = Models.listUsers(this.shop.id);
        },

        // ---- Settings: GAS / TG / Backup ----
        saveGAS() {
          GASClient.setConfig({ url: this.gasUrl, api_key: this.gasKey, branch_id: this.shop.id });
          this.gasMsg = 'Đã lưu cấu hình GAS.';
        },
        async testGAS() {
          this.gasMsg = 'Đang ping...';
          const r = await GASClient.ping();
          this.gasMsg = r.ok ? '✓ GAS phản hồi OK' : '✗ ' + (r.reason || 'không phản hồi');
        },
        async syncNow() {
          this.gasMsg = 'Đang đồng bộ...';
          await SyncQueue.flushOnce(this.shop.id);
          this.gasMsg = 'Đã chạy đồng bộ.';
        },
        saveTG() {
          TelegramBot.setConfig({ bot_token: this.tgToken, chat_id: this.tgChat });
          this.tgMsg = 'Đã lưu cấu hình Telegram.';
        },
        async testTG() {
          try { await TelegramBot.send('🔔 Test từ EcoSynTech POS — ' + new Date().toLocaleString('vi-VN')); this.tgMsg = '✓ Đã gửi test.'; }
          catch (e) { this.tgMsg = '✗ ' + e.message; }
        },
        backupDB() {
          const blob = new Blob([DB.exportBlob()], { type: 'application/octet-stream' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = `pos-backup-${Utils.today()}.db`; a.click();
          URL.revokeObjectURL(url);
        },
        restoreDB(ev) {
          const f = ev.target.files[0]; if (!f) return;
          if (!confirm('Phục hồi sẽ GHI ĐÈ dữ liệu hiện tại. Tiếp tục?')) return;
          const r = new FileReader();
          r.onload = async () => { await DB.importBlob(new Uint8Array(r.result)); location.reload(); };
          r.readAsArrayBuffer(f);
        },
        async resetData() {
          if (!confirm('XOÁ TOÀN BỘ dữ liệu? Không thể hoàn tác!')) return;
          if (!confirm('Xác nhận lần 2?')) return;
          await DB.resetAll(); location.reload();
        },

        // ---- Theme + Big text + Tour ----
        toggleTheme() {
          this.theme = this.theme === 'dark' ? 'light' : 'dark';
          localStorage.setItem('eco_theme', this.theme);
          document.documentElement.setAttribute('data-theme', this.theme);
        },
        toggleBigText() {
          this.bigText = !this.bigText;
          localStorage.setItem('eco_bigtext', this.bigText ? '1' : '0');
          document.documentElement.classList.toggle('big-text', this.bigText);
        },
        nextTour() {
          const next = this.tourSteps[this.tourStep];
          if (next) this.view = next.id;
          this.tourStep++;
        },
        skipTour() { this.tourStep = 0; localStorage.setItem('eco_tour_done', '1'); },
        endTour() { this.tourStep = 0; localStorage.setItem('eco_tour_done', '1'); this.view = 'dashboard'; },
        restartTour() {
          localStorage.removeItem('eco_tour_done');
          this.tourStep = 1; this.view = 'dashboard';
        },

        // ---- Search palette ----
        openSearch() { this.searchOpen = true; this.searchQuery = ''; this.searchHighlight = 0; },
        searchResults() {
          const q = (this.searchQuery || '').trim().toLowerCase();
          if (!q) {
            return [
              { title: 'Dashboard', subtitle: 'Tổng quan kinh doanh', icon: 'dashboard', action: () => this.goView('dashboard') },
              { title: 'POS Bán hàng', subtitle: 'Tạo đơn mới', icon: 'pos', action: () => this.goView('pos') },
              { title: 'Import CSV', subtitle: 'Nhập từ KiotViet/Sapo/iPos/MISA', icon: 'import', action: () => this.goView('import') },
              { title: 'Báo cáo', subtitle: 'Doanh thu hôm nay', icon: 'reports', action: () => this.goView('reports') },
            ];
          }
          const out = [];
          this.navItems().forEach(n => {
            if (n.label.toLowerCase().includes(q)) out.push({ title: n.label, subtitle: 'Chuyển tab', icon: n.icon, action: () => this.goView(n.id) });
          });
          this.products.forEach(p => {
            if (p.name.toLowerCase().includes(q)) {
              out.push({ title: p.name, subtitle: 'Sản phẩm · ' + this.formatVND(p.base_price), icon: 'pos', action: () => { this.goView('pos'); this.quickAdd(p); } });
            }
          });
          this.ingredients.forEach(i => {
            if (i.name.toLowerCase().includes(q)) {
              out.push({ title: i.name, subtitle: 'Nguyên liệu · tồn ' + i.stock_current + ' ' + i.unit, icon: 'inventory', action: () => this.goView('inventory') });
            }
          });
          this.orders.forEach(o => {
            if (o.order_no.toLowerCase().includes(q)) {
              out.push({ title: o.order_no, subtitle: 'Đơn · ' + this.formatVND(o.total), icon: 'orders', action: () => this.goView('orders') });
            }
          });
          return out.slice(0, 20);
        },
        runSearchResult(r) {
          this.searchOpen = false;
          if (r && r.action) r.action();
        },
        runFirstSearchResult() {
          const r = this.searchResults()[0]; if (r) this.runSearchResult(r);
        },

        // ---- Keyboard shortcuts ----
        handleKey(e) {
          if (!this.user) return;
          // Ctrl/Cmd + K
          if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
            e.preventDefault(); this.openSearch(); return;
          }
          // Don't process F-keys when typing in input
          if (e.target.matches('input, textarea, select')) return;
          if (e.key === 'F1') { e.preventDefault(); this.goView('dashboard'); }
          else if (e.key === 'F2') { e.preventDefault(); this.goView('pos'); }
          else if (e.key === 'F3') { e.preventDefault(); this.goView('reports'); }
          else if (e.key === 'Escape') {
            if (this.searchOpen) this.searchOpen = false;
            else if (this.variantPicker.open) this.variantPicker.open = false;
            else if (this.checkout.open) this.checkout.open = false;
            else if (this.aboutOpen) this.aboutOpen = false;
            else if (this.mobileNavOpen) this.mobileNavOpen = false;
            else if (this.tourStep > 0) this.skipTour();
          }
        },

        // ---- Misc ----
        copyText(t) {
          if (navigator.clipboard) {
            navigator.clipboard.writeText(t).then(() => this.showToast('Đã copy URL'));
          } else {
            const ta = document.createElement('textarea'); ta.value = t; document.body.appendChild(ta); ta.select();
            try { document.execCommand('copy'); this.showToast('Đã copy URL'); } catch (e) {}
            document.body.removeChild(ta);
          }
        },

        // ---- Import wizard (unchanged from V2 logic) ----
        impStep: 1, impMsg: '', impBusy: false,
        impHeaders: [], impRows: [],
        impPresets: {}, impPresetKey: 'generic', impPresetName: '-', impDetectScore: 0, impDetectTotal: 0,
        impColumnMap: {}, impOrders: [], impItemCount: 0, impDuplicates: 0, impIssues: [],
        impDoDeduct: true, impResult: null,
        impFieldList: [
          { key: 'order_no',       label: 'Mã đơn',          required: true  },
          { key: 'created_at',     label: 'Thời gian',       required: true  },
          { key: 'product_name',   label: 'Sản phẩm',        required: true  },
          { key: 'qty',            label: 'Số lượng',        required: true  },
          { key: 'unit_price',     label: 'Đơn giá',         required: false },
          { key: 'line_total',     label: 'Thành tiền',      required: true  },
          { key: 'discount',       label: 'Giảm giá',        required: false },
          { key: 'total',          label: 'Tổng đơn',        required: false },
          { key: 'payment_method', label: 'Phương thức TT',  required: false },
          { key: 'customer',       label: 'Khách',           required: false },
          { key: 'note',           label: 'Ghi chú',         required: false },
        ],
        async impInit() {
          if (Object.keys(this.impPresets).length === 0) this.impPresets = await ImportWizard.loadPresets();
        },
        impReset() {
          this.impStep = 1; this.impMsg = ''; this.impHeaders = []; this.impRows = [];
          this.impPresetKey = 'generic'; this.impPresetName = '-';
          this.impColumnMap = {}; this.impOrders = []; this.impItemCount = 0;
          this.impDuplicates = 0; this.impIssues = []; this.impResult = null; this.impBusy = false;
        },
        impUpload(ev) {
          const f = ev.target.files[0]; if (!f) return;
          this.impMsg = 'Đang đọc file...';
          const r = new FileReader();
          r.onload = async () => {
            try {
              const text = r.result;
              const rows2D = CSVParser.parseCSV(text);
              const { headers, objects } = CSVParser.rowsToObjects(rows2D);
              this.impHeaders = headers; this.impRows = objects;
              if (Object.keys(this.impPresets).length === 0) await this.impInit();
              const det = ImportWizard.detectPreset(headers);
              this.impPresetKey = det.key;
              this.impPresetName = det.preset?.name || '-';
              this.impDetectScore = det.score;
              this.impDetectTotal = (det.preset?.detect_headers || []).length;
              const mapped = ImportWizard.autoMap(det.preset || this.impPresets.generic, headers);
              const fullMap = {};
              this.impFieldList.forEach(f => { fullMap[f.key] = mapped[f.key] || ''; });
              this.impColumnMap = fullMap;
              this.impMsg = 'OK — ' + objects.length + ' dòng dữ liệu.';
              this.impStep = 2;
            } catch (e) { this.impMsg = 'Lỗi đọc CSV: ' + e.message; }
          };
          r.readAsText(f, 'UTF-8');
        },
        impApplyPreset() {
          const preset = this.impPresets[this.impPresetKey]; if (!preset) return;
          this.impPresetName = preset.name;
          const mapped = ImportWizard.autoMap(preset, this.impHeaders);
          const fullMap = {};
          this.impFieldList.forEach(f => { fullMap[f.key] = mapped[f.key] || ''; });
          this.impColumnMap = fullMap;
        },
        impPreviewRows() {
          const preset = this.impPresets[this.impPresetKey] || this.impPresets.generic;
          if (!preset) return [];
          return ImportWizard.normalize(this.impRows.slice(0, 3), preset, this.impColumnMap);
        },
        impPrepareConfirm() {
          const preset = this.impPresets[this.impPresetKey] || this.impPresets.generic;
          const missing = this.impFieldList.filter(f => f.required && !this.impColumnMap[f.key]);
          if (missing.length) {
            alert('Còn ' + missing.length + ' trường bắt buộc chưa map: ' + missing.map(m => m.label).join(', '));
            return;
          }
          const norm = ImportWizard.normalize(this.impRows, preset, this.impColumnMap);
          this.impOrders = ImportWizard.groupByOrder(norm, preset);
          this.impItemCount = this.impOrders.reduce((s, o) => s + o.items.length, 0);
          let dupes = 0;
          this.impOrders.forEach(o => {
            const r = DB.exec("SELECT id FROM orders WHERE branch_id=? AND order_no=? LIMIT 1", [this.shop.id, o.order_no]);
            if (r.length > 0) dupes++;
          });
          this.impDuplicates = dupes;
          const v = ImportWizard.validate(this.impOrders);
          this.impIssues = v.issues;
          this.impStep = 4;
        },
        async impExecute() {
          this.impBusy = true;
          try {
            const summary = ImportWizard.importOrders(this.shop.id, this.impOrders, {
              source: this.impPresetName, deduct: this.impDoDeduct,
            });
            this.impResult = summary;
            this.refreshDashboard(); this.loadOrders(); this.loadCatalog();
            this.showToast('Đã import ' + summary.imported + ' đơn');
            // Show deduct summary modal if we deducted
            if (this.impDoDeduct && summary.deduct_lines?.length > 0) {
              const agg = Models.aggregateDeductions(summary.deduct_lines);
              const lowAfter = Models.lowStockAlertsAfter(this.shop.id, agg.map(a => a.ingredient_id));
              this.showDeductSummary({
                title: 'Import hoàn tất — tổng trừ kho',
                orders: summary.imported, items: summary.deduct_lines.length,
                lines: agg, lowAfter,
              });
            }
          } catch (e) { this.impMsg = 'Lỗi import: ' + e.message; console.error(e); }
          finally { this.impBusy = false; }
        },
      };
    }
  </script>
</body>
