<!doctype html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#16a34a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="assets/icons/logo.svg" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.svg" />
  <title>EcoSynTech POS — Quản lý đẳng cấp cho quán cafe Việt</title>
  <meta name="description" content="POS + Management Dashboard cho quán cafe / trà sữa. Offline-first, white-label, vận hành 1 người." />

  <!-- Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Design system -->
  <link rel="stylesheet" href="assets/styles.css" />

  <!-- WASM + reactive -->
  <script src="https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/sql-wasm.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.10/dist/cdn.min.js"></script>

  <!-- Config -->
  <script src="config/business-rules.js"></script>
  <script src="config/payment-methods.js"></script>
  <script src="config/printer.js"></script>
  <script src="config/notification.js"></script>

  <!-- Core -->
  <script src="modules/core/utils.js"></script>
  <script src="modules/core/event-bus.js"></script>
  <script src="modules/core/icons.js"></script>
  <script src="modules/core/db.js"></script>
  <script src="modules/core/models.js"></script>
  <script src="modules/auth/session.js"></script>
  <script src="modules/auth/permissions.js"></script>
  <script src="modules/pos/cart.js"></script>
  <script src="modules/dashboard/dashboard.js"></script>
  <script src="modules/import/csv-parser.js"></script>
  <script src="modules/import/import-wizard.js"></script>
  <script src="modules/sync/gas-client.js"></script>
  <script src="modules/sync/sync-queue.js"></script>
  <script src="modules/sync/telegram-bot.js"></script>
</head>
<body>
  <div x-data="posApp()" x-init="boot()" x-cloak>

    <!-- ============ SPLASH ============ -->
    <template x-if="!booted">
      <div class="splash">
        <div class="splash-content">
          <div class="logo-mark logo-mark--xl">ES</div>
          <div class="spinner"></div>
          <div class="splash-msg" x-text="bootMsg"></div>
          <div class="caption" style="margin-top: 24px;">EcoSynTech Global · v2.1</div>
        </div>
      </div>
    </template>

    <!-- ============ LOGIN ============ -->
    <template x-if="booted && !user">
      <div class="login-screen">
        <div class="login-card">
          <div class="login-brand">
            <div class="logo-mark logo-mark--lg">ES</div>
            <div>
              <div class="caption" style="text-align:center;">EcoSynTech POS</div>
              <div class="login-shop" style="text-align:center; margin-top:4px;" x-text="shop?.name || 'Quán cafe'"></div>
            </div>
            <div class="login-hint">Nhập mã PIN 4 số</div>
          </div>
          <div class="pin-dots">
            <template x-for="i in 4" :key="i">
              <div class="pin-dot" :class="{filled: pin.length >= i}">
                <span x-text="pin.length >= i ? '•' : ''"></span>
              </div>
            </template>
          </div>
          <div class="pin-grid">
            <template x-for="k in ['1','2','3','4','5','6','7','8','9']" :key="k">
              <button @click="pressPin(k)" class="pin-key" x-text="k"></button>
            </template>
            <button @click="pin=''" class="pin-key action">Xoá</button>
            <button @click="pressPin('0')" class="pin-key">0</button>
            <button @click="submitPin()" class="pin-key primary">OK</button>
          </div>
          <div class="login-error" x-text="loginError"></div>
          <div class="text-center text-xs text-subtle" style="margin-top: 12px;">
            Mặc định: Chủ <b>1234</b> · NV <b>5678</b> — đổi ngay sau lần đầu
          </div>
        </div>
      </div>
    </template>

    <!-- ============ APP SHELL ============ -->
    <template x-if="booted && user">
      <div class="app-shell"
           :class="{
             'sidebar-collapsed': layout === 'tablet' && !sidebarOpenTablet,
             'mobile': layout === 'mobile',
             'sidebar-open': mobileNavOpen,
             'big-text': bigText
           }">

        <!-- Mobile drawer backdrop -->
        <div class="sidebar-backdrop" @click="mobileNavOpen=false"></div>

        <!-- ====== SIDEBAR ====== -->
        <aside class="sidebar">
          <div class="sidebar-brand">
            <div class="logo-mark logo-mark--md">ES</div>
            <div class="brand-text">
              <div class="brand-name">EcoSynTech POS</div>
              <div class="brand-sub" x-text="shop?.name || 'Quán cafe'"></div>
            </div>
          </div>

          <nav class="sidebar-nav">
            <template x-for="item in navItems()" :key="item.id">
              <button class="nav-item"
                      :class="{ active: view === item.id }"
                      :data-tour="item.id"
                      @click="goView(item.id)"
                      :title="item.label">
                <span class="nav-icon" x-html="Icons.svg(item.icon)"></span>
                <span class="nav-label" x-text="item.label"></span>
              </button>
            </template>
          </nav>

          <div class="sidebar-user">
            <div class="avatar" x-text="initials(user.name)"></div>
            <div class="user-info">
              <div class="user-name" x-text="user.name"></div>
              <div class="user-role" x-text="user.role === 'owner' ? 'Chủ quán' : 'Nhân viên'"></div>
            </div>
            <button class="icon-btn danger" @click="logout()" title="Đăng xuất" x-html="Icons.svg('logout')"></button>
          </div>
        </aside>

        <!-- ====== MAIN AREA ====== -->
        <div class="main-area">

          <!-- TopBar -->
          <header class="topbar">
            <button class="icon-btn hamburger" @click="toggleNav()" x-html="Icons.svg('menu_burger')" title="Menu"></button>
            <div class="topbar-center">
              <div class="breadcrumb">
                Trang chủ <span x-html="Icons.svg('chevron_right','width=10 height=10')" style="opacity:.5; vertical-align: middle;"></span>
                <span class="crumb-active" x-text="viewLabel()"></span>
              </div>
              <div class="shop-meta">
                <span x-text="shop?.name"></span> · <span x-text="shiftLabel()"></span>
              </div>
            </div>
            <div class="topbar-right">
              <button class="search-shortcut" @click="openSearch()" title="Tìm kiếm (Ctrl+K)">
                <span x-html="Icons.svg('search','width=14 height=14')" style="display:inline-flex;"></span>
                <span class="search-shortcut-label">Tìm kiếm</span>
                <kbd>⌘K</kbd>
              </button>
              <button class="icon-btn topbar-icon" @click="goView('reports')" title="Cảnh báo">
                <span x-html="Icons.svg('bell')"></span>
                <span class="badge" x-show="dash.anomalies?.length > 0" x-text="dash.anomalies?.length"></span>
              </button>
              <button class="icon-btn" @click="aboutOpen=true" title="Giới thiệu"
                      x-html="Icons.svg('info')"></button>
            </div>
          </header>

          <!-- ===== CONTENT ===== -->
          <main class="content">

            <!-- ============ VIEW: DASHBOARD ============ -->
            <div x-show="view==='dashboard'">
              <div class="page-header">
                <div>
                  <h1>Tổng quan</h1>
                  <div class="page-subtitle">Tóm tắt hoạt động kinh doanh hôm nay và xu hướng 30 ngày qua.</div>
                </div>
                <button class="btn btn-ghost btn-sm" @click="refreshDashboard()" title="Cập nhật">
                  <span x-html="Icons.svg('refresh','width=14 height=14')"></span> Cập nhật
                </button>
              </div>

              <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px;">
                <div class="card kpi-card kpi-revenue">
                  <div class="kpi-label">💰 Doanh thu hôm nay</div>
                  <div class="kpi-value num" x-text="formatVND(dash.today.revenue)"></div>
                  <div class="kpi-meta">
                    <span class="delta" :class="dash.today.delta_pct >= 0 ? 'up' : 'down'">
                      <span x-text="(dash.today.delta_pct >= 0 ? '▲ +' : '▼ ') + dash.today.delta_pct + '%'"></span>
                    </span>
                    so với hôm qua
                  </div>
                </div>
                <div class="card kpi-card" :class="dash.lowStock.length > 0 ? 'kpi-warning' : ''">
                  <div class="kpi-label">📦 Cảnh báo tồn kho</div>
                  <div class="kpi-value num" :class="dash.lowStock.length > 0 ? 'text-warning' : 'text-success'" x-text="dash.lowStock.length"></div>
                  <div class="kpi-meta">nguyên liệu dưới mức tối thiểu</div>
                </div>
                <div class="card kpi-card kpi-info">
                  <div class="kpi-label">📊 Doanh thu 7 ngày</div>
                  <div class="kpi-value num" x-text="formatVND(dash.last7.revenue)"></div>
                  <div class="kpi-meta">TB <span class="num" x-text="formatVND(dash.last7.avg_per_day)"></span>/ngày</div>
                </div>
                <div class="card kpi-card">
                  <div class="kpi-label">💸 Chi phí NL 30 ngày</div>
                  <div class="kpi-value num" x-text="formatVND(dash.cost30)"></div>
                  <div class="kpi-meta">tổng tiền nhập kho</div>
                </div>
                <div class="card kpi-card kpi-accent">
                  <div class="kpi-label">💵 Lợi nhuận gộp 30 ngày</div>
                  <div class="kpi-value num" :class="dash.profit30.gross >= 0 ? 'text-success' : 'text-danger'" x-text="formatVND(dash.profit30.gross)"></div>
                  <div class="kpi-meta">biên <span class="num" x-text="dash.profit30.margin_pct"></span>%</div>
                </div>
                <div class="card kpi-card" :class="dash.anomalies.length > 0 ? 'kpi-warning' : ''">
                  <div class="kpi-label">⚠ Bất thường</div>
                  <div class="kpi-value num" :class="dash.anomalies.length > 0 ? 'text-warning' : 'text-success'" x-text="dash.anomalies.length"></div>
                  <div class="kpi-meta">cần để ý</div>
                </div>
              </div>

              <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 16px;">
                <div class="card">
                  <h3 style="margin-bottom: 12px;">Doanh thu 30 ngày qua</h3>
                  <div x-html="lineChartHtml"></div>
                </div>
                <div class="card">
                  <h3 style="margin-bottom: 12px;">Top 5 món bán chạy (7 ngày)</h3>
                  <div x-show="dash.topItems.length > 0" x-html="topChartHtml"></div>
                  <div x-show="dash.topItems.length === 0" class="empty-state" style="padding: 24px 0;">
                    <div class="empty-icon" x-html="Icons.svg('trophy','width=36 height=36')"></div>
                    <div class="empty-title">Chưa có dữ liệu bán</div>
                    <div class="empty-desc">Bán đơn đầu tiên hoặc import CSV để xem top món bán chạy.</div>
                    <div class="empty-actions">
                      <button class="btn btn-primary btn-sm" @click="goView('pos')">Đi tới POS</button>
                      <button class="btn btn-ghost btn-sm" @click="goView('import')" x-show="user.role==='owner'">Import CSV</button>
                    </div>
                  </div>
                </div>
              </div>

              <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 16px; margin-top: 16px;">
                <div class="card">
                  <h3 style="margin-bottom: 12px;">Tồn kho cảnh báo</h3>
                  <table class="table" x-show="dash.lowStock.length > 0">
                    <thead><tr><th>Nguyên liệu</th><th>Tồn</th><th>Tiêu/ngày</th><th>Còn ~</th></tr></thead>
                    <tbody>
                      <template x-for="l in dash.lowStock.slice(0, 10)" :key="l.id">
                        <tr>
                          <td x-text="l.name"></td>
                          <td><span class="num" x-text="l.stock_current"></span> <span class="text-subtle" x-text="l.unit"></span></td>
                          <td class="num" x-text="l.burn_per_day"></td>
                          <td><span class="num" :class="(l.days_left??99) < 3 ? 'text-danger' : ''" x-text="l.days_left != null ? l.days_left + ' ngày' : '—'"></span></td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                  <div x-show="dash.lowStock.length === 0" class="empty-state" style="padding: 16px 0;">
                    <div class="empty-icon" style="background: var(--primary-light);" x-html="Icons.svg('check','width=36 height=36')"></div>
                    <div class="empty-title">Tồn kho ổn định</div>
                    <div class="empty-desc">Em sẽ báo nếu có nguyên liệu dưới mức tối thiểu.</div>
                  </div>
                </div>
                <div class="card">
                  <h3 style="margin-bottom: 12px;">Bất thường gần đây</h3>
                  <div x-show="dash.anomalies.length > 0">
                    <template x-for="(a, idx) in dash.anomalies" :key="idx">
                      <div style="border: 1px solid var(--border); border-left: 3px solid var(--warning); border-radius: var(--r-md); padding: 12px; margin-bottom: 8px;">
                        <div style="font-weight: 600; font-size: 13px;"><span x-text="a.icon"></span> <span x-text="a.title"></span></div>
                        <div class="text-xs text-muted" style="margin-top: 4px;" x-text="a.detail"></div>
                      </div>
                    </template>
                  </div>
                  <div x-show="dash.anomalies.length === 0" class="empty-state" style="padding: 16px 0;">
                    <div class="empty-icon" style="background: var(--primary-light);" x-html="Icons.svg('sparkles','width=36 height=36')"></div>
                    <div class="empty-title">Không có bất thường</div>
                    <div class="empty-desc">Hệ thống đang vận hành ổn định.</div>
                  </div>
                </div>
              </div>
            </div>

            <!-- ============ VIEW: POS ============ -->
            <div x-show="view==='pos'">
              <div class="page-header">
                <div>
                  <h1>Bán hàng</h1>
                  <div class="page-subtitle">Chọn sản phẩm và thanh toán. Đơn lưu offline, đồng bộ khi có mạng.</div>
                </div>
              </div>

              <!-- Quick favorites (top 5 today) -->
              <div x-show="favorites.length > 0" style="margin-bottom: 16px;">
                <div class="caption" style="margin-bottom: 8px;">⚡ Bán nhanh — top 5 hôm nay (1 chạm = thêm vào giỏ)</div>
                <div style="display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;">
                  <template x-for="f in favorites" :key="f.id">
                    <button class="card card-hover" style="min-width: 140px; padding: 10px; cursor: pointer; border-color: var(--accent); position: relative;" @click="quickAdd(f)">
                      <div style="font-size: 22px; text-align: center;" x-text="f.icon || '⭐'"></div>
                      <div class="text-sm" style="font-weight: 500; margin-top: 4px; line-height: 1.3;" x-text="f.name"></div>
                      <div class="text-xs" style="color: var(--primary); font-weight: 700; margin-top: 2px;" x-text="formatVND(f.base_price)"></div>
                    </button>
                  </template>
                </div>
              </div>

              <div class="pos-grid">
                <section class="pos-menu-col">
                  <div class="cat-tabs">
                    <button class="cat-tab" :class="{active: catFilter===0}" @click="catFilter=0">Tất cả</button>
                    <template x-for="c in categories" :key="c.id">
                      <button class="cat-tab" :class="{active: catFilter===c.id}" @click="catFilter=c.id">
                        <span x-text="c.icon"></span> <span x-text="c.name"></span>
                      </button>
                    </template>
                  </div>
                  <div class="product-grid">
                    <template x-for="p in filteredProducts()" :key="p.id">
                      <button class="product-card" @click="onProductClick(p)">
                        <div class="product-icon" x-text="p.icon || '🥤'"></div>
                        <div class="product-name" x-text="p.name"></div>
                        <div class="product-price num" x-text="formatVND(p.base_price)"></div>
                      </button>
                    </template>
                  </div>
                </section>

                <aside class="cart-panel">
                  <div class="cart-head">
                    <div style="display: flex; align-items: center; gap: 8px;">
                      <span x-html="Icons.svg('cart','width=18 height=18')" style="color: var(--primary);"></span>
                      <span style="font-weight: 600;">Giỏ hàng</span>
                      <span class="pill muted num" x-text="cart.count()"></span>
                    </div>
                    <button class="text-xs text-danger" @click="clearCart()" style="background:none;border:0;cursor:pointer;">Xoá hết</button>
                  </div>
                  <div class="cart-items">
                    <div x-show="cart.items.length===0" class="cart-empty">
                      <div style="font-size: 36px; opacity: 0.4;">🧋</div>
                      <div style="margin-top: 8px;">Chọn sản phẩm để bán...</div>
                    </div>
                    <template x-for="(it, idx) in cart.items" :key="idx">
                      <div class="cart-item">
                        <div style="display: flex; justify-content: space-between; gap: 8px;">
                          <div style="flex: 1; min-width: 0;">
                            <div style="font-weight: 500; font-size: 13px;"><span x-text="it.icon"></span> <span x-text="it.product_name"></span></div>
                            <div class="text-xs text-subtle" x-text="it.variants.map(v=>v.name).join(' · ')"></div>
                          </div>
                          <button class="icon-btn" style="width:24px;height:24px;color:var(--danger);" @click="removeFromCart(idx)" x-html="Icons.svg('close','width=14 height=14')"></button>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 6px;">
                          <div style="display: flex; gap: 4px; align-items: center;">
                            <button class="qty-btn" @click="cart.dec(idx)">−</button>
                            <span class="num" style="width: 24px; text-align: center;" x-text="it.qty"></span>
                            <button class="qty-btn" @click="cart.inc(idx)">+</button>
                          </div>
                          <div class="num" style="font-weight: 600;" x-text="formatVND(it.line_total)"></div>
                        </div>
                      </div>
                    </template>
                  </div>
                  <div class="cart-totals">
                    <div class="row"><span>Tạm tính</span><span class="num" x-text="formatVND(cart.subtotal())"></span></div>
                    <div class="row text-subtle"><span>VAT (<span x-text="vatPct"></span>%)</span><span class="num" x-text="formatVND(cart.tax(vatPct))"></span></div>
                    <div class="row" style="align-items: center;">
                      <span>Giảm giá</span>
                      <input type="number" min="0" :max="cart.subtotal()" x-model.number="cart.discount" class="input num" style="width: 100px; text-align: right; padding: 4px 8px;" />
                    </div>
                    <div class="row grand"><span>TỔNG</span><span class="num" x-text="formatVND(cart.total(vatPct))"></span></div>
                    <button class="btn btn-accent btn-lg btn-block" style="margin-top: 12px;" :disabled="cart.items.length===0" @click="openCheckout()">
                      Thanh toán
                    </button>
                  </div>
                </aside>
              </div>
            </div>

            <!-- ============ VIEW: IMPORT ============ -->
            <div x-show="view==='import' && user.role==='owner'">
              <div class="page-header">
                <div>
                  <h1>Import doanh thu</h1>
                  <div class="page-subtitle">Nhập file CSV từ KiotViet / Sapo / iPos / MISA CukCuk vào hệ thống. App tự trừ kho theo công thức.</div>
                </div>
              </div>

              <div class="card">
                <div class="stepper">
                  <template x-for="(label, idx) in ['1. Upload CSV','2. Nhận diện POS','3. Map cột','4. Xác nhận']" :key="idx">
                    <div class="step-pill" :class="impStep===idx+1?'active':(impStep>idx+1?'done':'')" x-text="label"></div>
                  </template>
                </div>

                <!-- Step 1 -->
                <div x-show="impStep===1">
                  <div class="text-sm text-muted" style="margin-bottom: 12px;">Chọn file CSV xuất từ POS hiện tại (KiotViet / Sapo / iPos / MISA / khác).</div>
                  <label class="btn btn-primary" style="cursor:pointer; display:inline-flex;">
                    <span x-html="Icons.svg('upload','width=14 height=14')"></span> Chọn file CSV
                    <input type="file" accept=".csv,text/csv" class="hidden" style="display:none;" @change="impUpload($event)" />
                  </label>
                  <div class="text-xs text-subtle" style="margin-top: 12px;" x-text="impMsg"></div>
                </div>

                <!-- Step 2 -->
                <div x-show="impStep===2">
                  <div class="text-sm" style="margin-bottom: 12px;">
                    Đã đọc <b class="num" x-text="impRows.length"></b> dòng, <b class="num" x-text="impHeaders.length"></b> cột.
                  </div>
                  <div class="field">
                    <div class="label">POS phát hiện:</div>
                    <div>
                      <b x-text="impPresetName"></b>
                      <span class="text-xs text-subtle">(điểm khớp <span class="num" x-text="impDetectScore"></span>/<span class="num" x-text="impDetectTotal"></span>)</span>
                    </div>
                  </div>
                  <div class="field">
                    <div class="label">Hoặc chọn thủ công:</div>
                    <select class="input" x-model="impPresetKey" @change="impApplyPreset()">
                      <template x-for="(p,k) in impPresets" :key="k">
                        <option :value="k" x-text="p.name"></option>
                      </template>
                    </select>
                  </div>
                  <div style="display:flex; gap: 8px; margin-top: 16px;">
                    <button class="btn btn-ghost btn-sm" @click="impStep=1">← Lại</button>
                    <button class="btn btn-primary btn-sm" @click="impStep=3">Tiếp →</button>
                  </div>
                </div>

                <!-- Step 3 -->
                <div x-show="impStep===3">
                  <div class="text-sm text-muted" style="margin-bottom: 12px;">Kéo / chọn cột CSV cho từng trường. Trường * bắt buộc.</div>
                  <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 8px;">
                    <template x-for="field in impFieldList" :key="field.key">
                      <div style="display:flex; align-items:center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border);">
                        <div style="min-width: 110px; font-size: 12px; color: var(--text-secondary);">
                          <span x-text="field.label"></span>
                          <span class="text-danger" x-show="field.required">*</span>
                        </div>
                        <select class="input" style="flex: 1;" x-model="impColumnMap[field.key]">
                          <option value="">— bỏ qua —</option>
                          <template x-for="h in impHeaders" :key="h"><option :value="h" x-text="h"></option></template>
                        </select>
                      </div>
                    </template>
                  </div>
                  <div class="caption" style="margin-top: 16px;">Preview 3 dòng đầu sau khi map:</div>
                  <div style="overflow-x: auto; margin-top: 8px;">
                    <table class="table text-xs">
                      <thead><tr>
                        <template x-for="f in impFieldList" :key="f.key"><th x-text="f.label"></th></template>
                      </tr></thead>
                      <tbody>
                        <template x-for="(row, idx) in impPreviewRows()" :key="idx">
                          <tr>
                            <template x-for="f in impFieldList" :key="f.key">
                              <td x-text="row[f.key] ?? ''"></td>
                            </template>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </div>
                  <div style="display:flex; gap: 8px; margin-top: 16px;">
                    <button class="btn btn-ghost btn-sm" @click="impStep=2">← Lại</button>
                    <button class="btn btn-primary btn-sm" @click="impPrepareConfirm()">Tiếp →</button>
                  </div>
                </div>

                <!-- Step 4 -->
                <div x-show="impStep===4">
                  <div class="text-sm" style="margin-bottom: 8px;">Sẽ import: <b class="num" x-text="impOrders.length"></b> đơn (<b class="num" x-text="impItemCount"></b> items)</div>
                  <div class="text-sm" style="margin-bottom: 12px;">Trùng <b class="num" x-text="impDuplicates"></b> đơn — sẽ bỏ qua.</div>
                  <div x-show="impIssues.length > 0" style="margin-bottom: 12px;">
                    <div class="text-warning" style="font-weight: 600;">Cảnh báo:</div>
                    <ul class="text-xs text-muted" style="margin: 4px 0 0 18px;">
                      <template x-for="(iss, idx) in impIssues.slice(0, 5)" :key="idx">
                        <li x-text="iss.msg"></li>
                      </template>
                    </ul>
                  </div>
                  <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer;">
                    <input type="checkbox" x-model="impDoDeduct" />
                    Auto-trừ kho theo công thức (recipes)
                  </label>
                  <div style="display:flex; gap: 8px; margin-top: 16px;">
                    <button class="btn btn-ghost btn-sm" @click="impStep=3">← Lại</button>
                    <button class="btn btn-primary" @click="impExecute()" :disabled="impBusy">
                      <span x-show="!impBusy">✓ Xác nhận import</span>
                      <span x-show="impBusy">Đang import...</span>
                    </button>
                    <button class="btn btn-ghost btn-sm" @click="impReset()">Huỷ</button>
                  </div>
                  <div x-show="impResult" style="margin-top: 16px; padding: 12px; background: var(--primary-light); border-radius: var(--r-md);">
                    <div class="text-success" style="font-weight: 600;">✓ Đã import <b x-text="impResult?.imported"></b> đơn (<span x-text="impResult?.skipped"></span> bỏ qua trùng)</div>
                    <div class="text-xs text-muted" x-show="impResult?.deduct_lines?.length > 0">
                      Trừ kho: <span class="num" x-text="impResult.deduct_lines.length"></span> dòng nguyên liệu
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- ============ VIEW: ORDERS ============ -->
            <div x-show="view==='orders'">
              <div class="page-header">
                <div>
                  <h1>Đơn hàng</h1>
                  <div class="page-subtitle">20 đơn gần nhất, kể cả đơn POS và đơn import CSV.</div>
                </div>
                <button class="btn btn-ghost btn-sm" @click="loadOrders()">
                  <span x-html="Icons.svg('refresh','width=14 height=14')"></span> Tải lại
                </button>
              </div>

              <div class="card">
                <table class="table">
                  <thead><tr><th>Mã đơn</th><th>Giờ</th><th>NV</th><th>Tổng</th><th>Trạng thái</th><th>Đồng bộ</th></tr></thead>
                  <tbody>
                    <template x-for="o in orders" :key="o.id">
                      <tr>
                        <td class="font-mono" x-text="o.order_no"></td>
                        <td x-text="fmtTime(o.created_at)"></td>
                        <td x-text="userName(o.user_id) || '—'"></td>
                        <td class="num" style="font-weight: 600;" x-text="formatVND(o.total)"></td>
                        <td><span class="pill" :class="o.status==='paid'?'success':o.status==='cancelled'?'danger':'muted'" x-text="o.status"></span></td>
                        <td><span class="pill" :class="o.sync_status==='synced'?'success':o.sync_status==='failed'?'danger':'warning'" x-text="o.sync_status"></span></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
                <div x-show="orders.length === 0" class="empty-state">
                  <div class="empty-icon" x-html="Icons.svg('inbox','width=36 height=36')"></div>
                  <div class="empty-title">Chưa có đơn nào</div>
                  <div class="empty-desc">Bán đơn đầu tiên trong tab POS hoặc import CSV để hiển thị ở đây.</div>
                  <div class="empty-actions">
                    <button class="btn btn-primary btn-sm" @click="goView('pos')">Đi tới POS</button>
                  </div>
                </div>
              </div>
            </div>

            <!-- ============ VIEW: REPORTS ============ -->
            <div x-show="view==='reports'">
              <div class="page-header">
                <div>
                  <h1>Báo cáo</h1>
                  <div class="page-subtitle">Doanh thu hôm nay theo phương thức thanh toán + top bán chạy.</div>
                </div>
              </div>

              <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 16px;">
                <div class="card">
                  <div class="caption">Số đơn</div>
                  <div class="kpi-value num text-primary" x-text="todayStats.orders"></div>
                </div>
                <div class="card">
                  <div class="caption">Doanh thu</div>
                  <div class="kpi-value num text-primary" x-text="formatVND(todayStats.revenue)"></div>
                </div>
                <div class="card">
                  <div class="caption">Tiền mặt</div>
                  <div style="font-size: 18px; font-weight: 600;" class="num" x-text="formatVND(todayStats.cash)"></div>
                </div>
                <div class="card">
                  <div class="caption">QR / Thẻ</div>
                  <div style="font-size: 18px; font-weight: 600;" class="num" x-text="formatVND(todayStats.qr + todayStats.card)"></div>
                </div>
              </div>

              <div class="card">
                <h3 style="margin-bottom: 12px;">Top bán chạy hôm nay</h3>
                <table class="table" x-show="todayBest.length > 0">
                  <thead><tr><th>#</th><th>Sản phẩm</th><th>SL</th><th>Doanh thu</th></tr></thead>
                  <tbody>
                    <template x-for="(b, idx) in todayBest" :key="idx">
                      <tr>
                        <td class="num" x-text="idx+1"></td>
                        <td x-text="b.product_name"></td>
                        <td class="num" x-text="b.qty"></td>
                        <td class="num" x-text="formatVND(b.revenue)"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
                <div x-show="todayBest.length === 0" class="empty-state" style="padding: 24px 0;">
                  <div class="empty-icon" x-html="Icons.svg('trophy','width=36 height=36')"></div>
                  <div class="empty-title">Chưa có đơn nào hôm nay</div>
                  <div class="empty-desc">Bán đơn đầu tiên để xem top bán chạy.</div>
                </div>
                <div style="display: flex; gap: 8px; margin-top: 16px;">
                  <button class="btn btn-ghost btn-sm" @click="exportTodayCSV()">
                    <span x-html="Icons.svg('download','width=14 height=14')"></span> Xuất CSV
                  </button>
                  <button class="btn btn-ghost btn-sm" @click="sendTelegramDigest()" x-show="user.role==='owner'">
                    📨 Gửi Telegram
                  </button>
                </div>
              </div>
            </div>

            <!-- ============ VIEW: MENU ============ -->
            <div x-show="view==='menu' && user.role==='owner'">
              <div class="page-header">
                <div>
                  <h1>Menu</h1>
                  <div class="page-subtitle"><span class="num" x-text="products.length"></span> sản phẩm.</div>
                </div>
                <button class="btn btn-primary btn-sm" @click="openProductEdit(null)">
                  <span x-html="Icons.svg('plus','width=14 height=14')"></span> Thêm sản phẩm
                </button>
              </div>

              <div class="card">
                <table class="table">
                  <thead><tr><th>Sản phẩm</th><th>Nhóm</th><th>Giá gốc</th><th></th></tr></thead>
                  <tbody>
                    <template x-for="p in products" :key="p.id">
                      <tr>
                        <td><span x-text="p.icon"></span> <span x-text="p.name"></span></td>
                        <td x-text="categoryName(p.category_id)"></td>
                        <td class="num" x-text="formatVND(p.base_price)"></td>
                        <td><button class="btn btn-ghost btn-sm" @click="openProductEdit(p)">Sửa</button></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </div>

            <!-- ============ VIEW: INVENTORY ============ -->
            <div x-show="view==='inventory' && user.role==='owner'">
              <div class="page-header">
                <div>
                  <h1>Kho</h1>
                  <div class="page-subtitle"><span class="num" x-text="ingredients.length"></span> nguyên liệu · <span class="num" x-text="lowStock.length"></span> cảnh báo.</div>
                </div>
              </div>

              <div class="card">
                <table class="table">
                  <thead><tr><th>Tên</th><th>Tồn</th><th>Min</th><th>Đơn giá</th><th>NCC</th><th></th></tr></thead>
                  <tbody>
                    <template x-for="i in ingredients" :key="i.id">
                      <tr :style="i.stock_current < i.stock_min ? 'background: rgba(245,158,11,0.05)' : ''">
                        <td x-text="i.name"></td>
                        <td><span class="num" x-text="i.stock_current"></span> <span class="text-subtle" x-text="i.unit"></span></td>
                        <td class="num" x-text="i.stock_min"></td>
                        <td class="num" x-text="formatVND(i.cost_per_unit)"></td>
                        <td x-text="i.supplier"></td>
                        <td><button class="btn btn-ghost btn-sm" @click="openInventoryTx(i)">+ Nhập/Xuất</button></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </div>

            <!-- ============ VIEW: SETTINGS ============ -->
            <div x-show="view==='settings' && user.role==='owner'">
              <div class="page-header">
                <div>
                  <h1>Cài đặt</h1>
                  <div class="page-subtitle">Thông tin quán, người dùng, đồng bộ và sao lưu.</div>
                </div>
              </div>

              <!-- Shop info -->
              <div class="card" style="margin-bottom: 16px;">
                <h3 style="margin-bottom: 12px;">Thông tin quán</h3>
                <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px;">
                  <div class="field"><div class="label">Tên quán</div><input class="input" x-model="shop.name" /></div>
                  <div class="field"><div class="label">Số điện thoại</div><input class="input" x-model="shop.phone" /></div>
                  <div class="field" style="grid-column: 1 / -1;"><div class="label">Địa chỉ</div><input class="input" x-model="shop.address" /></div>
                  <div class="field" style="grid-column: 1 / -1;"><div class="label">Slogan</div><input class="input" x-model="shop.slogan" /></div>
                  <div class="field"><div class="label">VAT %</div><input type="number" class="input num" x-model.number="shop.tax_rate" /></div>
                  <div class="field"><div class="label">Làm tròn (đồng)</div><input type="number" class="input num" x-model.number="shop.round_to" /></div>
                  <div class="field" style="grid-column: 1 / -1;">
                    <div class="label">Logo (PNG/JPG ≤ 200KB)</div>
                    <input type="file" accept="image/*" @change="uploadLogo($event)" />
                  </div>
                  <div class="field" style="grid-column: 1 / -1;"><div class="label">License cấp cho</div><input class="input" x-model="shop.license_to" /></div>
                </div>
                <button class="btn btn-primary btn-sm" style="margin-top: 8px;" @click="saveShop()">Lưu thông tin quán</button>
              </div>

              <!-- Users -->
              <div class="card" style="margin-bottom: 16px;">
                <h3 style="margin-bottom: 12px;">Người dùng & PIN</h3>
                <table class="table" style="margin-bottom: 12px;">
                  <thead><tr><th>Tên</th><th>Vai trò</th><th></th></tr></thead>
                  <tbody>
                    <template x-for="u in users" :key="u.id">
                      <tr>
                        <td x-text="u.name"></td>
                        <td><span class="pill" :class="u.role==='owner'?'info':'muted'" x-text="u.role==='owner'?'Chủ quán':'Nhân viên'"></span></td>
                        <td>
                          <button class="btn btn-ghost btn-sm" @click="changePinFor(u)">Đổi PIN</button>
                          <button class="btn btn-ghost btn-sm" style="color: var(--danger);" @click="deactivate(u)" x-show="u.id!==user.id">Xoá</button>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
                <div style="border-top: 1px solid var(--border); padding-top: 12px;">
                  <div class="caption" style="margin-bottom: 8px;">Thêm nhân viên</div>
                  <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                    <input class="input" style="max-width: 150px;" placeholder="Tên" x-model="newUser.name" />
                    <input class="input num" style="max-width: 120px;" placeholder="PIN 4 số" maxlength="4" x-model="newUser.pin" />
                    <select class="input" style="max-width: 140px;" x-model="newUser.role">
                      <option value="staff">Nhân viên</option>
                      <option value="owner">Chủ quán</option>
                    </select>
                    <button class="btn btn-primary btn-sm" @click="addUser()">Thêm</button>
                  </div>
                </div>
              </div>

              <!-- Kiosk mode -->
              <div class="card" style="margin-bottom: 16px;">
                <h3 style="margin-bottom: 12px;">🔒 Chế độ Kiosk — Khách tự order</h3>
                <div class="text-sm text-muted" style="margin-bottom: 12px;">
                  Đặt 1 tablet tại mỗi bàn. Khách tự chọn món → bấm "Đặt" → NV nhận đơn ở POS chính.
                  URL kiosk khoá admin, idle reset 5 phút.
                </div>
                <div class="field">
                  <div class="label">URL kiosk chung (không bàn)</div>
                  <div style="display: flex; gap: 8px;">
                    <input class="input font-mono" readonly :value="kioskUrl()" />
                    <button class="btn btn-ghost btn-sm" @click="copyText(kioskUrl())">Copy</button>
                  </div>
                </div>
                <div class="field">
                  <div class="label">URL kiosk bàn số (điền số rồi copy)</div>
                  <div style="display: flex; gap: 8px;">
                    <input type="number" class="input num" placeholder="VD: 5" x-model.number="kioskTable" style="max-width: 100px;" />
                    <input class="input font-mono" readonly :value="kioskUrl(kioskTable)" />
                    <button class="btn btn-ghost btn-sm" @click="copyText(kioskUrl(kioskTable))">Copy</button>
                  </div>
                </div>
                <div class="text-xs text-subtle">Mở URL trên tablet bàn → Add to Home Screen → kiosk lock. Đơn vào tab Đơn với nhãn "self_order".</div>
              </div>

              <!-- Preferences -->
              <div class="card" style="margin-bottom: 16px;">
                <h3 style="margin-bottom: 12px;">Tuỳ chỉnh giao diện</h3>
                <div style="display: flex; gap: 24px; flex-wrap: wrap;">
                  <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" :checked="theme==='dark'" @change="toggleTheme()" />
                    <span class="text-sm">Chế độ tối</span>
                  </label>
                  <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" :checked="bigText" @change="toggleBigText()" />
                    <span class="text-sm">Chế độ chữ to (1.25x)</span>
                  </label>
                  <button class="btn btn-ghost btn-sm" @click="restartTour()">Mở lại hướng dẫn 5 bước</button>
                </div>
              </div>

              <!-- GAS Sync -->
              <div class="card" style="margin-bottom: 16px;">
                <h3 style="margin-bottom: 12px;">Đồng bộ Google Sheets (GAS)</h3>
                <div class="text-xs text-muted" style="margin-bottom: 8px;">Dán Web App URL của Google Apps Script (deploy "Anyone").</div>
                <input class="input" style="margin-bottom: 8px;" placeholder="https://script.google.com/macros/s/.../exec" x-model="gasUrl" />
                <input class="input" style="margin-bottom: 8px;" placeholder="API key (tuỳ chọn)" x-model="gasKey" />
                <div style="display: flex; gap: 8px;">
                  <button class="btn btn-primary btn-sm" @click="saveGAS()">Lưu</button>
                  <button class="btn btn-ghost btn-sm" @click="testGAS()">Test ping</button>
                  <button class="btn btn-ghost btn-sm" @click="syncNow()">Đồng bộ ngay</button>
                </div>
                <div class="text-xs text-muted" style="margin-top: 8px;" x-text="gasMsg"></div>
              </div>

              <!-- Telegram -->
              <div class="card" style="margin-bottom: 16px;">
                <h3 style="margin-bottom: 12px;">Telegram báo doanh thu</h3>
                <input class="input" style="margin-bottom: 8px;" placeholder="Bot token (từ @BotFather)" x-model="tgToken" />
                <input class="input" style="margin-bottom: 8px;" placeholder="Chat ID" x-model="tgChat" />
                <div style="display: flex; gap: 8px;">
                  <button class="btn btn-primary btn-sm" @click="saveTG()">Lưu</button>
                  <button class="btn btn-ghost btn-sm" @click="testTG()">Gửi test</button>
                </div>
                <div class="text-xs text-muted" style="margin-top: 8px;" x-text="tgMsg"></div>
              </div>

              <!-- Backup -->
              <div class="card">
                <h3 style="margin-bottom: 12px;">Sao lưu & Phục hồi</h3>
                <div class="text-xs text-muted" style="margin-bottom: 12px;">Khuyến nghị: tải file .db hàng ngày, lưu Google Drive hoặc USB.</div>
                <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                  <button class="btn btn-primary btn-sm" @click="backupDB()">
                    <span x-html="Icons.svg('download','width=14 height=14')"></span> Tải file backup
                  </button>
                  <label class="btn btn-ghost btn-sm" style="cursor: pointer;">
                    <span x-html="Icons.svg('upload','width=14 height=14')"></span> Phục hồi từ file
                    <input type="file" accept=".db" style="display:none;" @change="restoreDB($event)" />
                  </label>
                  <button class="btn btn-danger btn-sm" @click="resetData()">⚠ Reset toàn bộ</button>
                </div>
              </div>
            </div>

          </main>

          <!-- ===== FOOTER ===== -->
          <footer class="content-footer">
            Powered by <a href="https://ecosyntechglobal.com" target="_blank" rel="noopener"><b>EcoSynTech Global</b></a> · v2.1 · <span class="text-subtle">Made in Vietnam 🇻🇳</span>
          </footer>
        </div>

        <!-- ===== MOBILE BOTTOM NAV ===== -->
        <nav class="bottom-nav" x-show="layout === 'mobile'">
          <template x-for="item in bottomNavItems()" :key="item.id">
            <button class="bottom-nav-item" :class="{active: view === item.id}" @click="goView(item.id); mobileNavOpen=false;">
              <span x-html="Icons.svg(item.icon)"></span>
              <span x-text="item.label"></span>
            </button>
          </template>
        </nav>

        <!-- ============ VARIANT PICKER MODAL ============ -->
        <div x-show="variantPicker.open" class="modal-backdrop" @click.self="variantPicker.open=false">
          <div class="modal">
            <div class="modal-head">
              <h3 x-text="variantPicker.product?.name"></h3>
              <div class="text-primary num" style="font-size: 20px; font-weight: 700; margin-top: 4px;" x-text="formatVND(variantPickerTotal())"></div>
            </div>
            <div class="modal-body">
              <template x-for="g in variantPicker.groups" :key="g.id">
                <div class="field">
                  <div class="label">
                    <span x-text="g.name"></span>
                    <span class="text-danger" x-show="g.required">*</span>
                  </div>
                  <div class="chip-group">
                    <template x-for="v in g.variants" :key="v.id">
                      <button class="chip" :class="{selected: isVariantSelected(g, v)}" @click="toggleVariant(g, v)">
                        <span x-text="v.name"></span>
                        <span class="chip-meta" x-show="v.price_modifier > 0">+<span class="num" x-text="formatVND(v.price_modifier)"></span></span>
                      </button>
                    </template>
                  </div>
                </div>
              </template>
            </div>
            <div class="modal-foot">
              <button class="btn btn-ghost" @click="variantPicker.open=false">Huỷ</button>
              <button class="btn btn-primary" @click="confirmVariantPick()" :disabled="!variantPickerValid()">Thêm vào giỏ</button>
            </div>
          </div>
        </div>

        <!-- ============ CHECKOUT MODAL ============ -->
        <div x-show="checkout.open" class="modal-backdrop" @click.self="checkout.open=false">
          <div class="modal">
            <div class="modal-head">
              <h3>Thanh toán</h3>
              <div class="text-primary num" style="font-size: 28px; font-weight: 700; margin-top: 4px;" x-text="formatVND(cart.total(vatPct))"></div>
            </div>
            <div class="modal-body">
              <div class="field">
                <div class="label">Phương thức</div>
                <div class="grid" style="grid-template-columns: repeat(3, 1fr); gap: 8px;">
                  <template x-for="(m, k) in enabledPayments()" :key="k">
                    <button :class="checkout.method===k?'card card-hover':'card'" :style="checkout.method===k?'border-color:var(--primary);background:var(--primary-light);':''" style="padding: 12px; text-align: center; cursor: pointer;" @click="checkout.method=k">
                      <div style="font-size: 24px;" x-text="m.icon"></div>
                      <div class="text-sm" style="margin-top: 4px;" x-text="m.label"></div>
                    </button>
                  </template>
                </div>
              </div>
              <div class="field" x-show="checkout.method==='cash'">
                <div class="label">Khách đưa</div>
