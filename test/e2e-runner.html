<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>E2E Test Runner — EcoSynTech POS</title>
  <link rel="stylesheet" href="../assets/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/sql-wasm.js"></script>

  <script src="../config/business-rules.js"></script>
  <script src="../config/payment-methods.js"></script>
  <script src="../config/printer.js"></script>
  <script src="../config/notification.js"></script>

  <script src="../modules/core/utils.js"></script>
  <script src="../modules/core/event-bus.js"></script>
  <script src="../modules/core/icons.js"></script>
  <script src="../modules/core/vietqr.js"></script>
  <script src="../modules/core/sepay.js"></script>
  <script src="../modules/core/db.js"></script>
  <script src="../modules/core/models.js"></script>
  <script src="../modules/auth/session.js"></script>
  <script src="../modules/auth/permissions.js"></script>
  <script src="../modules/pos/cart.js"></script>
  <script src="../modules/dashboard/dashboard.js"></script>
  <script src="../modules/sync/telegram-bot.js"></script>

  <style>
    body { padding: 24px; max-width: 980px; margin: 0 auto; }
    .test-row { display: grid; grid-template-columns: 32px 1fr 80px; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--border); align-items: start; }
    .test-row.pass { background: var(--primary-light); }
    .test-row.fail { background: #fee2e2; }
    .test-row.skip { background: var(--bg-hover); }
    .status { font-weight: 700; text-align: right; }
    .status.pass { color: var(--success); }
    .status.fail { color: var(--danger); }
    .status.skip { color: var(--text-tertiary); }
    .err { font-family: monospace; font-size: 11px; color: var(--danger); white-space: pre-wrap; word-break: break-word; }
    .det { font-size: 12px; color: var(--text-secondary); }
    .summary { padding: 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 16px; }
    h1 { margin: 0 0 6px; }
  </style>
</head>
<body>
  <div class="summary">
    <h1>E2E Test Runner — EcoSynTech POS</h1>
    <div class="text-sm text-muted">Chạy logic core trực tiếp trên cùng bundle như app. Reset DB sạch trước test.</div>
    <div id="overall" class="mt-3" style="font-weight: 700; font-size: 18px;">Đang khởi tạo...</div>
    <div id="meta" class="mt-2 text-sm text-muted"></div>
  </div>

  <div class="card" style="padding: 0;">
    <div style="padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
      <h3>Kết quả test</h3>
      <button class="btn btn-primary btn-sm" id="rerun">Re-run</button>
    </div>
    <div id="results"></div>
  </div>

  <pre id="json" style="margin-top: 16px; padding: 12px; background: #0f172a; color: #f8fafc; font-size: 11px; border-radius: 8px; overflow: auto;"></pre>

  <script>
    // ============================================================================
    // Test harness
    // ============================================================================
    const results = [];
    const $results = document.getElementById('results');
    const $overall = document.getElementById('overall');
    const $meta = document.getElementById('meta');
    const $json = document.getElementById('json');

    function render() {
      $results.innerHTML = '';
      results.forEach((r, i) => {
        const row = document.createElement('div');
        row.className = 'test-row ' + r.status;
        row.innerHTML = `
          <div>${i + 1}</div>
          <div>
            <div><b>${escape(r.name)}</b></div>
            ${r.detail ? `<div class="det">${escape(r.detail)}</div>` : ''}
            ${r.error ? `<div class="err">${escape(r.error)}</div>` : ''}
          </div>
          <div class="status ${r.status}">${r.status.toUpperCase()}</div>
        `;
        $results.appendChild(row);
      });
      const passed = results.filter(r => r.status === 'pass').length;
      const failed = results.filter(r => r.status === 'fail').length;
      const skipped = results.filter(r => r.status === 'skip').length;
      const total = results.length;
      const score = total > 0 ? Math.round((passed / total) * 100) : 0;
      $overall.textContent = `${passed}/${total} PASS · ${failed} FAIL · ${skipped} SKIP — Score ${score}%`;
      $overall.style.color = failed === 0 ? 'var(--success)' : 'var(--danger)';
      $meta.textContent = `Build: ${navigator.userAgent.match(/Chrome\/[\d.]+/)?.[0] || 'unknown'} · UA langs ${navigator.languages?.join(',')}`;
      window.__TEST_RESULT__ = { passed, failed, skipped, total, score, results };
      $json.textContent = JSON.stringify(window.__TEST_RESULT__, null, 2);
    }
    function escape(s) {
      return String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
    }
    function pass(name, detail) { results.push({ name, status: 'pass', detail: detail || '' }); render(); }
    function fail(name, error)   { results.push({ name, status: 'fail', error: String(error?.stack || error) }); render(); }
    function skip(name, reason)  { results.push({ name, status: 'skip', detail: reason || '' }); render(); }

    async function test(name, fn) {
      try {
        const detail = await fn();
        pass(name, detail);
      } catch (e) {
        fail(name, e);
      }
    }
    function assert(cond, msg) { if (!cond) throw new Error('Assert fail: ' + msg); }
    function assertEq(actual, expected, msg) {
      if (actual !== expected) throw new Error(`${msg || 'assertEq'}: expected ${expected}, got ${actual}`);
    }
    function approxEq(actual, expected, eps, msg) {
      eps = eps || 0.01;
      if (Math.abs(actual - expected) > eps) throw new Error(`${msg || 'approxEq'}: expected ${expected}, got ${actual}`);
    }

    // ============================================================================
    // Test cases
    // ============================================================================
    let shop, ownerUser, testProductId;

    async function runAll() {
      results.length = 0; render();

      // ---- T1: DB init + reset clean ----
      await test('T1. DB init + reset to clean seed', async () => {
        await DB.init();
        // Reset for fresh state
        await DB.resetAll();
        shop = Models.getShop();
        assert(shop, 'shop should exist');
        assert(shop.id > 0, 'shop.id > 0');
        return `shop="${shop.name}" id=${shop.id}`;
      });

      // ---- T2: Schema migration v3 applied ----
      await test('T2. Schema v3 columns present (orders.sepay_tx_id, branches.sepay_api_key)', async () => {
        const cols = DB.exec("PRAGMA table_info(orders)");
        const orderColNames = cols[0].values.map(r => r[1]);
        const branchCols = DB.exec("PRAGMA table_info(branches)")[0].values.map(r => r[1]);
        assert(orderColNames.includes('sepay_tx_id'), 'orders.sepay_tx_id');
        assert(orderColNames.includes('table_number'), 'orders.table_number');
        assert(orderColNames.includes('kitchen_status'), 'orders.kitchen_status');
        assert(branchCols.includes('sepay_api_key'), 'branches.sepay_api_key');
        assert(branchCols.includes('payment_bank_bin'), 'branches.payment_bank_bin');
        assert(branchCols.includes('telegram_bot_token'), 'branches.telegram_bot_token');
        return `orders: ${orderColNames.length} cols, branches: ${branchCols.length} cols`;
      });

      // ---- T3: Auth owner PIN 1234 ----
      await test('T3. Auth owner PIN 1234 success', async () => {
        ownerUser = await Models.authPin('1234', shop.id);
        assert(ownerUser, 'auth should succeed');
        assertEq(ownerUser.role, 'owner', 'role');
        return `user="${ownerUser.name}" role=${ownerUser.role}`;
      });

      // ---- T4: Auth wrong PIN fails ----
      await test('T4. Auth wrong PIN returns null', async () => {
        const u = await Models.authPin('0000', shop.id);
        assert(!u, 'should be null/undefined');
        return 'OK rejected';
      });

      // ---- T5: Update shop name ----
      await test('T5. updateShop name persists', async () => {
        Models.updateShop({ id: shop.id, name: 'Quán Demo CEO', address: 'Saigon', phone: '0900000000', slogan: '', logo_data_url: null, tax_rate: 0, round_to: 1000, license_to: 'CEO Demo' });
        const re = Models.getShop();
        assertEq(re.name, 'Quán Demo CEO');
        shop = re;
        return `name="${re.name}"`;
      });

      // ---- T6: Sepay config XOR roundtrip ----
      await test('T6. Sepay config save + decode roundtrip', async () => {
        Models.updateSepayConfig(shop.id, { api_key: 'TEST_API_KEY_123', enabled: true, polling_seconds: 5 });
        const re = Models.getShop();
        const decoded = Models.getSepayApiKey(re);
        assertEq(decoded, 'TEST_API_KEY_123');
        assertEq(re.sepay_enabled, 1);
        assertEq(re.sepay_polling_seconds, 5);
        return 'roundtrip OK';
      });

      // ---- T7: Telegram per-shop ----
      await test('T7. updateTelegramPerShop persists', async () => {
        Models.updateTelegramPerShop(shop.id, { bot_token: 'BOT123', chat_id: '789', enabled: true });
        const re = Models.getShop();
        assertEq(re.telegram_bot_token, 'BOT123');
        assertEq(re.telegram_chat_id, '789');
        assertEq(re.telegram_notify_enabled, 1);
        return 'persist OK';
      });

      // ---- T8: Payment Bank config ----
      await test('T8. Payment QR config (VietQR MBBank)', async () => {
        Models.updatePayment(shop.id, { bank_bin: '970422', account_no: '0123456789', account_name: 'NGUYEN VAN A', qr_enabled: true });
        const re = Models.getShop();
        assertEq(re.payment_bank_bin, '970422');
        assertEq(re.payment_account_no, '0123456789');
        assertEq(re.payment_qr_enabled, 1);
        return 'payment OK';
      });

      // ---- T9: VietQR URL builder ----
      await test('T9. VietQR.qrUrl builds proper URL with amount + addInfo', async () => {
        const url = VietQR.qrUrl({ bank_bin: '970422', account_no: '0123456789', account_name: 'NGUYEN VAN A', amount: 50000, message: 'TEST-001' });
        assert(url.includes('970422-0123456789'), 'URL has bank+account');
        assert(url.includes('amount=50000'), 'has amount');
        assert(url.includes('TEST-001') || url.includes('TEST'), 'has message');
        return url.slice(0, 80) + '...';
      });

      // ---- T10: Create Product "Test Latte L" ----
      await test('T10. upsertProduct create new', async () => {
        const cats = Models.listCategories(shop.id);
        const catId = cats[0]?.id || 1;
        testProductId = Models.upsertProduct({ id: null, branch_id: shop.id, category_id: catId, name: 'Test Latte L', base_price: 50000, icon: '☕', active: 1, sort_order: 99 });
        assert(testProductId > 0, 'returned id > 0');
        const prods = Models.listProducts(shop.id);
        assert(prods.some(p => p.id === testProductId), 'in list');
        return `id=${testProductId}`;
      });

      // ---- T11: Recipe per size variant ----
      await test('T11. Recipe per variant (S/M/L) with variant_filter', async () => {
        // ingredient 1 = Cà phê bột, 2 = Sữa đặc, 20 = Ly nhựa
        Models.upsertRecipe(testProductId, 1, 10, 'S');
        Models.upsertRecipe(testProductId, 1, 15, 'M');
        Models.upsertRecipe(testProductId, 1, 20, 'L');
        Models.upsertRecipe(testProductId, 2, 30, 'S');
        Models.upsertRecipe(testProductId, 2, 50, 'M');
        Models.upsertRecipe(testProductId, 2, 75, 'L');
        Models.upsertRecipe(testProductId, 20, 1, null); // ly = all sizes
        const recs = Models.listRecipesForProduct(testProductId);
        assertEq(recs.length, 7, 'should have 7 recipe rows');
        return `${recs.length} rows`;
      });

      // ---- T12: Recipe cost calc ----
      await test('T12. recipeCostForProduct calculates per-line cost', async () => {
        const cost = Models.recipeCostForProduct(testProductId);
        assert(cost.total_cost > 0, 'cost > 0');
        assert(cost.lines.length === 7, '7 lines');
        return `total=${cost.total_cost}đ, ${cost.lines.length} lines`;
      });

      // ---- T13: Inventory bulk batch ----
      await test('T13. addInventoryTxBatch — nhập 5kg sữa + 2kg cafe + 100 ly', async () => {
        // initial stock_current values from seed
        const before = {
          ca_phe: Models.listIngredients(shop.id).find(i => i.id === 1)?.stock_current,
          sua: Models.listIngredients(shop.id).find(i => i.id === 2)?.stock_current,
          ly: Models.listIngredients(shop.id).find(i => i.id === 20)?.stock_current,
        };
        Models.addInventoryTxBatch([
          { branch_id: shop.id, ingredient_id: 1, type: 'purchase', qty: 2000, unit_cost: 200, total_cost: 400000, supplier: 'NCC Test', user_id: ownerUser.id, note: 'E2E test nhập' },
          { branch_id: shop.id, ingredient_id: 2, type: 'purchase', qty: 5000, unit_cost: 50, total_cost: 250000, supplier: 'NCC Test', user_id: ownerUser.id },
          { branch_id: shop.id, ingredient_id: 20, type: 'purchase', qty: 100, unit_cost: 1500, total_cost: 150000, supplier: 'NCC Test', user_id: ownerUser.id },
        ]);
        const after = {
          ca_phe: Models.listIngredients(shop.id).find(i => i.id === 1)?.stock_current,
          sua: Models.listIngredients(shop.id).find(i => i.id === 2)?.stock_current,
          ly: Models.listIngredients(shop.id).find(i => i.id === 20)?.stock_current,
        };
        assertEq(after.ca_phe - before.ca_phe, 2000, 'cafe +2000');
        assertEq(after.sua - before.sua, 5000, 'sua +5000');
        assertEq(after.ly - before.ly, 100, 'ly +100');
        return `cafe ${before.ca_phe}→${after.ca_phe}, sua ${before.sua}→${after.sua}, ly ${before.ly}→${after.ly}`;
      });

      // ---- T14: createOrder + auto-deduct (size M without variant filter applied) ----
      let order1Total = 0;
      await test('T14. createOrder POS — bán 1 Test Latte (default deduct base/no-variant recipe = ly only)', async () => {
        // Use cart-like input
        const items = [{
          product_id: testProductId,
          product_name: 'Test Latte L',
          variants: [],
          unit_price: 50000,
          qty: 1,
          line_total: 50000,
        }];
        const orderData = {
          branch_id: shop.id, user_id: ownerUser.id, status: 'paid',
          subtotal: 50000, tax: 0, discount: 0, total: 50000,
          payment_method: 'cash', cash_received: 50000, change_given: 0, note: 'E2E test',
        };
        const before_ly = Models.listIngredients(shop.id).find(i => i.id === 20).stock_current;
        const res = Models.createOrder(orderData, items);
        order1Total = 50000;
        assert(res.id > 0, 'id > 0');
        assert(res.deductions, 'deductions returned');
        const after_ly = Models.listIngredients(shop.id).find(i => i.id === 20).stock_current;
        // No variant supplied → only variant_filter=null recipes apply (ly nhựa only)
        assertEq(after_ly, before_ly - 1, 'ly trừ 1');
        return `order_no=${res.order_no}, ${res.deductions.length} deduction lines`;
      });

      // ---- T15: Kitchen status transitions ----
      await test('T15. Kitchen status pending → preparing → ready → served', async () => {
        // Last order
        const recent = Models.listRecentOrders(shop.id, 1);
        const orderId = recent[0].id;
        Models.updateKitchenStatus(orderId, 'preparing', ownerUser.id);
        let o = Models.getOrderById(orderId);
        assertEq(o.kitchen_status, 'preparing');
        assert(o.kitchen_started_at > 0, 'started_at set');
        assert(o.assigned_user_id === ownerUser.id, 'assigned to owner');
        Models.updateKitchenStatus(orderId, 'ready', ownerUser.id);
        o = Models.getOrderById(orderId);
        assertEq(o.kitchen_status, 'ready');
        assert(o.kitchen_ready_at > 0, 'ready_at set');
        Models.updateKitchenStatus(orderId, 'served', ownerUser.id);
        o = Models.getOrderById(orderId);
        assertEq(o.kitchen_status, 'served');
        return 'all 3 transitions OK';
      });

      // ---- T16: Daily revenue calc ----
      await test('T16. dailyRevenue matches sum of orders', async () => {
        const stats = Models.dailyRevenue(shop.id, new Date());
        assert(stats.orders >= 1, '>= 1 order');
        assert(stats.revenue === 50000, 'revenue 50000');
        return `${stats.orders} đơn · ${stats.revenue}đ`;
      });

      // ---- T17: Sepay matcher amount + content ----
      await test('T17. Sepay matchTxToOrder — amount+content positive', async () => {
        const order = { order_no: '2026-06-08#003', total: 95000 };
        const tx_ok = { amount_in: 95000, transaction_content: 'CK 20260608003 noi dung' };
        const tx_wrong_amt = { amount_in: 50000, transaction_content: '20260608003' };
        const tx_wrong_content = { amount_in: 95000, transaction_content: 'KHAC' };
        assert(Sepay.matchTxToOrder(tx_ok, order), 'should match positive');
        assert(!Sepay.matchTxToOrder(tx_wrong_amt, order), 'wrong amount no match');
        assert(!Sepay.matchTxToOrder(tx_wrong_content, order), 'wrong content no match');
        return '3/3 case OK';
      });

      // ---- T18: Sepay findMatch + markOrderPaidBySepay idempotent ----
      await test('T18. markOrderPaidBySepay is idempotent', async () => {
        const recent = Models.listRecentOrders(shop.id, 5);
        // Pick a recent order (we'll synthesize a paid via Sepay)
        const order = recent[0];
        const orig_status = order.status;
        // Reset to pending for test
        DB.run("UPDATE orders SET status='pending', sepay_tx_id=NULL WHERE id=?", [order.id]);
        // Apply once
        Models.markOrderPaidBySepay(order.id, 'TX_AAA');
        let o = Models.getOrderById(order.id);
        assertEq(o.status, 'paid');
        assertEq(o.sepay_tx_id, 'TX_AAA');
        const firstPaidAt = o.paid_at;
        // Apply again with different tx — guard should reject
        Models.markOrderPaidBySepay(order.id, 'TX_BBB');
        o = Models.getOrderById(order.id);
        assertEq(o.sepay_tx_id, 'TX_AAA', 'guard preserved first tx');
        return 'idempotent OK';
      });

      // ---- T19: BroadcastChannel availability ----
      await test('T19. BroadcastChannel supported (cross-tab sync)', async () => {
        assert(typeof BroadcastChannel !== 'undefined', 'BC not supported');
        const bc = new BroadcastChannel('ecosyntech-pos-test');
        bc.close();
        return 'BC available';
      });

      // ---- T20: DB.reload after persist ----
      await test('T20. DB.reload re-reads from IndexedDB', async () => {
        const before = Models.listRecentOrders(shop.id, 1)[0].id;
        await DB.persist();
        const ok = await DB.reload();
        assert(ok, 'reload returned true');
        const after = Models.listRecentOrders(shop.id, 1)[0].id;
        assertEq(after, before, 'order id preserved across reload');
        return 'reload OK';
      });

      // ---- T21: Telegram.sendForShop disabled returns null (no network) ----
      await test('T21. TelegramBot.sendForShop disabled → null (non-blocking)', async () => {
        const re = await TelegramBot.sendForShop({ telegram_notify_enabled: 0 }, 'test');
        assertEq(re, null, 'null when disabled');
        return 'null OK';
      });

      // ---- T22: Cart line math ----
      await test('T22. Cart add + subtotal + tax + total', async () => {
        const c = window.makeCart();
        const p = { id: 1, name: 'Mock', base_price: 30000, icon: '☕' };
        c.addProduct(p, []);
        c.addProduct(p, []);
        assertEq(c.count(), 2);
        assertEq(c.subtotal(), 60000);
        assertEq(c.tax(10), 6000);
        c.discount = 5000;
        assertEq(c.total(10), 60000 + 6000 - 5000);
        return 'math OK';
      });

      // ---- T23: Dashboard snapshot ----
      await test('T23. Dashboard.snapshot returns full shape', async () => {
        const snap = Dashboard.snapshot(shop.id);
        assert('today' in snap, 'today');
        assert('last7' in snap, 'last7');
        assert('profit30' in snap, 'profit30');
        assert(Array.isArray(snap.lowStock), 'lowStock array');
        assert(Array.isArray(snap.anomalies), 'anomalies array');
        return `today ${snap.today.revenue}đ, lowStock ${snap.lowStock.length}, anomalies ${snap.anomalies.length}`;
      });

      // ---- T24: Order with table_number + order_source persists ----
      await test('T24. createOrder with table_number + order_source (Kiosk simulation)', async () => {
        const items = [{ product_id: testProductId, product_name: 'Test Latte L', variants: [], unit_price: 50000, qty: 1, line_total: 50000 }];
        const res = Models.createOrder({
          branch_id: shop.id, user_id: null, status: 'pending',
          subtotal: 50000, tax: 0, discount: 0, total: 50000,
          payment_method: 'transfer', note: '[KIOSK]',
          table_number: 5, order_source: 'self_order', kitchen_status: 'pending',
        }, items);
        const o = Models.getOrderById(res.id);
        assertEq(o.table_number, 5);
        assertEq(o.order_source, 'self_order');
        assertEq(o.kitchen_status, 'pending');
        assertEq(o.status, 'pending');
        return `order_no=${res.order_no}, table=5`;
      });

      // ---- T25: listKitchenOrdersByStatus returns Kiosk order ----
      await test('T25. listKitchenOrdersByStatus("pending") returns Kiosk order', async () => {
        const pending = Models.listKitchenOrdersByStatus(shop.id, 'pending');
        assert(pending.length >= 1, 'has pending kitchen order');
        const kioskOrder = pending.find(o => o.table_number === 5);
        assert(kioskOrder, 'Kiosk order present');
        return `${pending.length} pending kitchen orders`;
      });

      render();
      return window.__TEST_RESULT__;
    }

    document.getElementById('rerun').addEventListener('click', () => runAll());

    // Auto-run on load
    window.addEventListener('load', async () => {
      try {
        await runAll();
      } catch (e) {
        $overall.textContent = 'Bootstrap error: ' + e.message;
        $overall.style.color = 'var(--danger)';
      }
    });
  </script>
</body>
</html>
